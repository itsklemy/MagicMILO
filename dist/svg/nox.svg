<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="noxGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#EDE8F7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5C4A8A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="noxBody" x1="110" y1="100" x2="210" y2="240">
      <stop offset="0%" stop-color="#9B8EC4"/>
      <stop offset="100%" stop-color="#5C4A8A"/>
    </linearGradient>

    <style>
      .floaty {
        animation: floaty 4.5s ease-in-out infinite;
        transform-origin: 160px 170px;
      }

      .blink {
        animation: blink 5.5s infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      .twinkle {
        animation: twinkle 2.5s ease-in-out infinite;
        transform-origin: center;
      }

      @keyframes floaty {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      @keyframes blink {
        0%,44%,48%,100% { transform: scaleY(1); }
        46% { transform: scaleY(0.08); }
      }

      @keyframes twinkle {
        0%,100% { opacity: .6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.3); }
      }
    </style>
  </defs>

  <!-- halo nuit doux -->
  <ellipse cx="160" cy="170" rx="115" ry="95" fill="url(#noxGlow)"/>

  <g class="floaty">

    <!-- ombre -->
    <ellipse cx="160" cy="272" rx="55" ry="10" fill="#2A1A5A" opacity=".1"/>

    <!-- corps (forme douce type étoile/nuage) -->
    <path d="
      M160 105
      C185 110 210 135 205 170
      C210 200 185 230 160 235
      C135 230 110 200 115 170
      C110 135 135 110 160 105
    " fill="url(#noxBody)"/>

    <!-- reflets -->
    <ellipse cx="140" cy="150" rx="25" ry="20" fill="white" opacity=".15"/>

    <!-- étoiles décoratives -->
    <g class="twinkle">
      <circle cx="130" cy="135" r="2.5" fill="white"/>
      <circle cx="185" cy="140" r="2" fill="white"/>
      <circle cx="165" cy="120" r="2.5" fill="white"/>
    </g>

    <!-- yeux -->
    <ellipse cx="138" cy="165" rx="18" ry="21" fill="white"/>
    <ellipse cx="182" cy="165" rx="18" ry="21" fill="white"/>

    <g class="blink">
      <ellipse cx="138" cy="165" rx="8" ry="11" fill="#2A1A5A"/>
      <ellipse cx="182" cy="165" rx="8" ry="11" fill="#2A1A5A"/>
    </g>

    <!-- reflets yeux -->
    <ellipse cx="141" cy="161" rx="3" ry="3.5" fill="white"/>
    <ellipse cx="185" cy="161" rx="3" ry="3.5" fill="white"/>

    <!-- joues -->
    <ellipse cx="120" cy="188" rx="7" ry="4.5" fill="#FFB8D0" opacity=".4"/>
    <ellipse cx="200" cy="188" rx="7" ry="4.5" fill="#FFB8D0" opacity=".4"/>

    <!-- sourire rassurant -->
    <path d="M152 190 Q160 196 168 190" stroke="#EDE8F7" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- petites mains -->
    <ellipse cx="120" cy="205" rx="9" ry="7" fill="#7C6AB0"/>
    <ellipse cx="200" cy="205" rx="9" ry="7" fill="#7C6AB0"/>

  </g>
</svg>