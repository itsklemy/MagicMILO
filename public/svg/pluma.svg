<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="plumaGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#DDF8FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7EC8C8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="plumaBody" x1="120" y1="90" x2="210" y2="240">
      <stop offset="0%" stop-color="#EFFFFF"/>
      <stop offset="100%" stop-color="#85D8E8"/>
    </linearGradient>

    <style>
      .floaty {
        animation: floaty 4.2s ease-in-out infinite;
        transform-origin: 160px 170px;
      }

      .blink {
        animation: blink 5.4s infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      .sway {
        animation: sway 4.8s ease-in-out infinite;
        transform-origin: 160px 180px;
      }

      @keyframes floaty {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      @keyframes blink {
        0%,44%,48%,100% { transform: scaleY(1); }
        46% { transform: scaleY(0.08); }
      }

      @keyframes sway {
        0%,100% { transform: rotate(0deg); }
        25% { transform: rotate(-1.5deg); }
        75% { transform: rotate(1.5deg); }
      }
    </style>
  </defs>

  <ellipse cx="160" cy="172" rx="110" ry="95" fill="url(#plumaGlow)"/>

  <g class="floaty sway">
    <ellipse cx="160" cy="272" rx="54" ry="10" fill="#1A5050" opacity=".08"/>

    <!-- forme goutte ultra ronde -->
    <path d="
      M160 88
      C182 110 205 136 205 170
      C205 209 184 236 160 236
      C136 236 115 209 115 170
      C115 136 138 110 160 88
    " fill="url(#plumaBody)"/>

    <!-- reflets -->
    <ellipse cx="145" cy="145" rx="22" ry="30" fill="white" opacity=".22"/>
    <ellipse cx="132" cy="172" rx="10" ry="14" fill="white" opacity=".25"/>

    <!-- yeux -->
    <ellipse cx="138" cy="164" rx="18" ry="21" fill="white"/>
    <ellipse cx="182" cy="164" rx="18" ry="21" fill="white"/>

    <g class="blink">
      <ellipse cx="138" cy="164" rx="8" ry="11" fill="#2D6E7A"/>
      <ellipse cx="182" cy="164" rx="8" ry="11" fill="#2D6E7A"/>
    </g>

    <ellipse cx="141" cy="160" rx="3" ry="3.5" fill="white"/>
    <ellipse cx="185" cy="160" rx="3" ry="3.5" fill="white"/>

    <!-- joues -->
    <ellipse cx="120" cy="184" rx="7" ry="4.5" fill="#FFB8D0" opacity=".45"/>
    <ellipse cx="200" cy="184" rx="7" ry="4.5" fill="#FFB8D0" opacity=".45"/>

    <!-- bouche douce -->
    <path d="M152 186 Q160 191 168 186" stroke="#2D6E7A" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- petites larmes rassurantes -->
    <path d="M119 196 C124 202 124 208 119 213 C114 208 114 202 119 196Z" fill="#BFEFFF" opacity=".8"/>
    <path d="M201 196 C206 202 206 208 201 213 C196 208 196 202 201 196Z" fill="#BFEFFF" opacity=".8"/>
  </g>
</svg>
