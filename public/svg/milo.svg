<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="miloGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#FFF4B8" stop-opacity="1"/>
      <stop offset="65%" stop-color="#FFD86B" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#FFD86B" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="miloBody" x1="110" y1="95" x2="210" y2="220">
      <stop offset="0%" stop-color="#FFF7C8"/>
      <stop offset="100%" stop-color="#FFD86B"/>
    </linearGradient>

    <style>
      .floaty {
        animation: floaty 4s ease-in-out infinite;
        transform-origin: 160px 160px;
      }

      .blinkL, .blinkR {
        animation: blink 5.2s infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      .wingL {
        animation: wingL 2.6s ease-in-out infinite;
        transform-origin: 108px 170px;
      }

      .wingR {
        animation: wingR 2.6s ease-in-out infinite;
        transform-origin: 212px 170px;
      }

      .halo {
        animation: halo 3s ease-in-out infinite;
        transform-origin: 160px 160px;
      }

      @keyframes floaty {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      @keyframes blink {
        0%, 44%, 48%, 100% { transform: scaleY(1); }
        46% { transform: scaleY(0.08); }
      }

      @keyframes wingL {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-7deg); }
      }

      @keyframes wingR {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(7deg); }
      }

      @keyframes halo {
        0%, 100% { transform: scale(1); opacity: .85; }
        50% { transform: scale(1.05); opacity: 1; }
      }
    </style>
  </defs>

  <ellipse class="halo" cx="160" cy="160" rx="118" ry="102" fill="url(#miloGlow)"/>

  <g class="floaty">
    <!-- ailes -->
    <g class="wingL">
      <path d="M112 152C90 138 68 146 60 163C54 176 61 190 78 191C93 192 106 184 118 171Z" fill="#FFFDF4"/>
      <path d="M103 162C90 155 79 159 73 168C69 174 74 181 84 181C93 180 101 175 108 169Z" fill="#FFF2D6"/>
    </g>

    <g class="wingR">
      <path d="M208 152C230 138 252 146 260 163C266 176 259 190 242 191C227 192 214 184 202 171Z" fill="#FFFDF4"/>
      <path d="M217 162C230 155 241 159 247 168C251 174 246 181 236 181C227 180 219 175 212 169Z" fill="#FFF2D6"/>
    </g>

    <!-- rayons doux -->
    <g opacity=".95">
      <ellipse cx="160" cy="88" rx="14" ry="24" fill="#FFD86B"/>
      <ellipse cx="160" cy="232" rx="14" ry="24" fill="#FFD86B"/>
      <ellipse cx="88" cy="160" rx="24" ry="14" fill="#FFD86B"/>
      <ellipse cx="232" cy="160" rx="24" ry="14" fill="#FFD86B"/>

      <ellipse cx="109" cy="109" rx="12" ry="20" transform="rotate(-45 109 109)" fill="#FFD86B"/>
      <ellipse cx="211" cy="109" rx="12" ry="20" transform="rotate(45 211 109)" fill="#FFD86B"/>
      <ellipse cx="109" cy="211" rx="12" ry="20" transform="rotate(45 109 211)" fill="#FFD86B"/>
      <ellipse cx="211" cy="211" rx="12" ry="20" transform="rotate(-45 211 211)" fill="#FFD86B"/>
    </g>

    <!-- corps -->
    <circle cx="160" cy="160" r="58" fill="url(#miloBody)"/>
    <circle cx="160" cy="160" r="46" fill="#FFF4B8" opacity=".55"/>

    <!-- pieds -->
    <ellipse cx="132" cy="209" rx="13" ry="10" fill="#FFC94D"/>
    <ellipse cx="188" cy="209" rx="13" ry="10" fill="#FFC94D"/>

    <!-- mains -->
    <ellipse cx="118" cy="176" rx="11" ry="10" fill="#FFC94D"/>
    <ellipse cx="202" cy="176" rx="11" ry="10" fill="#FFC94D"/>

    <!-- yeux -->
    <ellipse cx="139" cy="156" rx="18" ry="20" fill="white"/>
    <ellipse cx="181" cy="156" rx="18" ry="20" fill="white"/>

    <g class="blinkL">
      <ellipse cx="139" cy="156" rx="9" ry="11" fill="#6B4600"/>
      <ellipse cx="142" cy="152" rx="3" ry="3.5" fill="white"/>
    </g>

    <g class="blinkR">
      <ellipse cx="181" cy="156" rx="9" ry="11" fill="#6B4600"/>
      <ellipse cx="184" cy="152" rx="3" ry="3.5" fill="white"/>
    </g>

    <!-- joues -->
    <ellipse cx="121" cy="176" rx="7" ry="4.5" fill="#FFB8B8" opacity=".55"/>
    <ellipse cx="199" cy="176" rx="7" ry="4.5" fill="#FFB8B8" opacity=".55"/>

    <!-- bouche -->
    <path d="M151 177Q160 185 169 177" stroke="#A45A00" stroke-width="3.4" stroke-linecap="round" fill="none"/>

    <!-- sourcils doux -->
    <path d="M131 132Q139 128 147 132" stroke="#E0A92B" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M173 132Q181 128 189 132" stroke="#E0A92B" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>
</svg>