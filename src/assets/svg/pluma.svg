<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Soft glow -->
  <circle cx="100" cy="100" r="80" fill="url(#plumaGlow)" opacity="0.2"/>
  <!-- Raindrops falling below -->
  <ellipse cx="78" cy="162" rx="4" ry="8" fill="#7ec8c8" opacity="0.4"/>
  <ellipse cx="100" cy="168" rx="4" ry="8" fill="#7ec8c8" opacity="0.35"/>
  <ellipse cx="122" cy="160" rx="4" ry="8" fill="#7ec8c8" opacity="0.4"/>
  <ellipse cx="88" cy="174" rx="3" ry="6" fill="#a8e6cf" opacity="0.3"/>
  <ellipse cx="112" cy="172" rx="3" ry="6" fill="#a8e6cf" opacity="0.3"/>
  <!-- Cloud puffs at base -->
  <circle cx="68" cy="128" r="20" fill="url(#plumaBody)"/>
  <circle cx="132" cy="128" r="20" fill="url(#plumaBody)"/>
  <!-- Main cloud body -->
  <ellipse cx="100" cy="118" rx="44" ry="38" fill="url(#plumaBody)"/>
  <!-- Puffs on top -->
  <circle cx="80" cy="90" r="24" fill="url(#plumaBody)"/>
  <circle cx="120" cy="90" r="24" fill="url(#plumaBody)"/>
  <circle cx="100" cy="78" r="20" fill="url(#plumaBody)"/>
  <!-- Soft inner light -->
  <ellipse cx="100" cy="108" rx="30" ry="26" fill="white" opacity="0.2"/>
  <!-- Eyes - gentle, slightly droopy -->
  <circle cx="87" cy="104" r="9" fill="#e8f8f8"/>
  <circle cx="113" cy="104" r="9" fill="#e8f8f8"/>
  <circle cx="87.5" cy="105" r="5.5" fill="#2a7878"/>
  <circle cx="113.5" cy="105" r="5.5" fill="#2a7878"/>
  <!-- Eye shine -->
  <circle cx="90" cy="102.5" r="2" fill="white"/>
  <circle cx="116" cy="102.5" r="2" fill="white"/>
  <!-- Gentle slightly sad brows -->
  <path d="M81 93 Q87 91 93 94" stroke="#7ec8c8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M107 94 Q113 91 119 93" stroke="#7ec8c8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Small gentle mouth -->
  <path d="M92 118 Q100 122 108 118" stroke="#7ec8c8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Blush -->
  <ellipse cx="78" cy="115" rx="7" ry="4" fill="#a8e6cf" opacity="0.4"/>
  <ellipse cx="122" cy="115" rx="7" ry="4" fill="#a8e6cf" opacity="0.4"/>
  <!-- Tiny tear on cheek -->
  <ellipse cx="80" cy="120" rx="2.5" ry="4" fill="#7ec8c8" opacity="0.5"/>
  <defs>
    <radialGradient id="plumaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="100%" stop-color="#7ec8c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plumaBody" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e8f8f8"/>
      <stop offset="100%" stop-color="#a8d8d8"/>
    </radialGradient>
  </defs>
</svg>
