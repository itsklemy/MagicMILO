<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360" fill="none">
  <!-- Book shadow -->
  <ellipse cx="150" cy="348" rx="90" ry="12" fill="#1a1535" opacity="0.3"/>
  <!-- Back cover -->
  <rect x="148" y="20" width="120" height="300" rx="8" fill="url(#backCover)"/>
  <!-- Pages visible -->
  <rect x="148" y="24" width="116" height="292" rx="4" fill="#fdf6e8" opacity="0.9"/>
  <!-- Page lines -->
  <line x1="164" y1="50" x2="252" y2="50" stroke="#e8dcc8" stroke-width="1.5"/>
  <line x1="164" y1="65" x2="252" y2="65" stroke="#e8dcc8" stroke-width="1.5"/>
  <line x1="164" y1="80" x2="240" y2="80" stroke="#e8dcc8" stroke-width="1.5"/>
  <line x1="164" y1="95" x2="248" y2="95" stroke="#e8dcc8" stroke-width="1.5"/>
  <!-- Front cover -->
  <rect x="32" y="20" width="120" height="300" rx="8" fill="url(#frontCover)"/>
  <!-- Cover decoration border -->
  <rect x="40" y="28" width="104" height="284" rx="4" stroke="#c4b8e8" stroke-width="1.5" fill="none" opacity="0.6"/>
  <rect x="44" y="32" width="96" height="276" rx="3" stroke="#9b8ec4" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Moon and stars on cover -->
  <path d="M92 90 Q80 78 82 62 Q96 64 104 76 Q98 86 92 90Z" fill="#ffd166" opacity="0.8"/>
  <path d="M92 90 L84 76 Q82 62 96 60 Q110 66 104 82Z" fill="#fdf6e8" opacity="0.6"/>
  <!-- Stars on cover -->
  <path d="M66 72 L68 66 L70 72 L76 74 L70 76 L68 82 L66 76 L60 74Z" fill="#ffd166" opacity="0.9"/>
  <path d="M110 52 L111.5 48 L113 52 L117 53.5 L113 55 L111.5 59 L110 55 L106 53.5Z" fill="#c4b8e8" opacity="0.8"/>
  <circle cx="120" cy="76" r="3" fill="#c4b8e8" opacity="0.7"/>
  <circle cx="58" cy="100" r="2.5" fill="#ffd166" opacity="0.6"/>
  <!-- Title text placeholder on cover -->
  <rect x="52" y="120" width="80" height="8" rx="4" fill="#c4b8e8" opacity="0.4"/>
  <rect x="58" y="134" width="68" height="6" rx="3" fill="#9b8ec4" opacity="0.3"/>
  <!-- Ornament at bottom of cover -->
  <path d="M72 270 Q92 260 112 270 Q92 278 72 270Z" fill="#c4b8e8" opacity="0.4"/>
  <circle cx="92" cy="270" r="4" fill="#ffd166" opacity="0.7"/>
  <!-- Spine -->
  <rect x="144" y="20" width="12" height="300" rx="2" fill="url(#spine)"/>
  <!-- Spine decorations -->
  <circle cx="150" cy="50" r="3" fill="#c4b8e8" opacity="0.6"/>
  <circle cx="150" cy="170" r="3" fill="#c4b8e8" opacity="0.6"/>
  <circle cx="150" cy="290" r="3" fill="#c4b8e8" opacity="0.6"/>
  <!-- Magical glow from spine -->
  <rect x="150" y="20" width="4" height="300" fill="url(#spineGlow)" opacity="0.5"/>
  <defs>
    <linearGradient id="frontCover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2660"/>
      <stop offset="100%" stop-color="#1a1535"/>
    </linearGradient>
    <linearGradient id="backCover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#231d4f"/>
      <stop offset="100%" stop-color="#14102e"/>
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d3578"/>
      <stop offset="100%" stop-color="#2a2255"/>
    </linearGradient>
    <linearGradient id="spineGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b8e8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c4b8e8"/>
      <stop offset="100%" stop-color="#c4b8e8" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
