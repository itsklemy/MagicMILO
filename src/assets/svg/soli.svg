<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Warm golden glow -->
  <circle cx="100" cy="100" r="80" fill="url(#soliGlow)" opacity="0.4"/>
  <circle cx="100" cy="100" r="60" fill="url(#soliGlow)" opacity="0.3"/>
  <!-- Wings - delicate and luminous -->
  <ellipse cx="62" cy="88" rx="28" ry="18" fill="url(#soliWing)" transform="rotate(-25, 62, 88)" opacity="0.7"/>
  <ellipse cx="138" cy="88" rx="28" ry="18" fill="url(#soliWing)" transform="rotate(25, 138, 88)" opacity="0.7"/>
  <!-- Wing veins -->
  <path d="M62 90 Q48 76 44 64" stroke="#ffd166" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M62 88 Q60 72 58 60" stroke="#ffd166" stroke-width="1" opacity="0.4" fill="none"/>
  <path d="M138 90 Q152 76 156 64" stroke="#ffd166" stroke-width="1" opacity="0.5" fill="none"/>
  <!-- Body - small and luminous -->
  <ellipse cx="100" cy="115" rx="36" ry="40" fill="url(#soliBody)"/>
  <!-- Inner glow core -->
  <ellipse cx="100" cy="112" rx="20" ry="24" fill="#ffd166" opacity="0.35"/>
  <!-- Head shape -->
  <circle cx="100" cy="86" r="24" fill="url(#soliBody)"/>
  <!-- Antenna -->
  <path d="M92 66 Q88 54 84 48" stroke="#ffb347" stroke-width="2" stroke-linecap="round" fill="none"/>
  <circle cx="83" cy="47" r="4" fill="#ffd166"/>
  <path d="M108 66 Q112 54 116 48" stroke="#ffb347" stroke-width="2" stroke-linecap="round" fill="none"/>
  <circle cx="117" cy="47" r="4" fill="#ffd166"/>
  <!-- Eyes - warm and gentle -->
  <circle cx="88" cy="86" r="8.5" fill="#fff8e8"/>
  <circle cx="112" cy="86" r="8.5" fill="#fff8e8"/>
  <circle cx="88.5" cy="87" r="5" fill="#7a4800"/>
  <circle cx="112.5" cy="87" r="5" fill="#7a4800"/>
  <!-- Eye shine -->
  <circle cx="91" cy="84.5" r="2" fill="white"/>
  <circle cx="115" cy="84.5" r="2" fill="white"/>
  <!-- Warm smile -->
  <path d="M88 100 Q100 108 112 100" stroke="#e08800" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Blush -->
  <ellipse cx="78" cy="96" rx="7" ry="4.5" fill="#ffd166" opacity="0.35"/>
  <ellipse cx="122" cy="96" rx="7" ry="4.5" fill="#ffd166" opacity="0.35"/>
  <!-- Light particles around -->
  <circle cx="52" cy="72" r="5" fill="#ffd166" opacity="0.6"/>
  <circle cx="148" cy="68" r="4" fill="#ffd166" opacity="0.55"/>
  <circle cx="44" cy="118" r="3" fill="#ffb347" opacity="0.5"/>
  <circle cx="156" cy="115" r="4" fill="#ffd166" opacity="0.5"/>
  <circle cx="60" cy="148" r="3.5" fill="#ffd166" opacity="0.4"/>
  <circle cx="140" cy="152" r="3" fill="#ffb347" opacity="0.45"/>
  <!-- Tiny sparkle shapes -->
  <path d="M165 88 L167 84 L169 88 L173 90 L169 92 L167 96 L165 92 L161 90Z" fill="#ffd166" opacity="0.6"/>
  <defs>
    <radialGradient id="soliGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="soliBody" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff8d0"/>
      <stop offset="100%" stop-color="#ffcf60"/>
    </radialGradient>
    <radialGradient id="soliWing" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
</svg>
